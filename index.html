<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
        .bento-card { background: white; border: 1px solid #eee; border-radius: 18px; transition: all 0.2s ease; }
        .bento-card:active { transform: scale(0.98); background: #fafafa; }
        .zen-button { background: #1a1a1a; color: white; border-radius: 12px; padding: 14px 24px; transition: opacity 0.2s; }
        .zen-button:active { opacity: 0.7; }
        .secondary-button { background: #f0f0f0; color: #555; border-radius: 12px; padding: 14px 24px; }
        .anime-placeholder { background: #f9f9f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #aaa; border: 1px dashed #ddd; }
    </style>
</head>
<body class="p-6 max-w-md mx-auto">

    <header class="mb-8">
        <h1 id="time-greeting" class="text-xs tracking-widest uppercase text-gray-400 mb-1">Loading...</h1>
        <h2 class="text-2xl font-semibold">Ready for Day 1?</h2>
    </header>

    <div class="bento-card p-6 mb-6 shadow-sm border-gray-100">
        <div class="flex justify-between items-center mb-4">
            <span class="px-3 py-1 bg-gray-100 text-[10px] rounded-full uppercase tracking-wider font-semibold">Next Up</span>
            <span class="text-xs text-gray-400">Sequence Mode</span>
        </div>
        <h3 class="text-xl font-medium mb-1">Biceps & Shoulders</h3>
        <p class="text-sm text-gray-500 mb-6 italic">Day 1 Sequence</p>
        <button onclick="startWorkout(fullRoutine)" class="zen-button w-full font-medium">Start Routine</button>
    </div>

    <h3 class="text-sm font-semibold mb-4 text-gray-400 uppercase tracking-tight">Explore Muscles</h3>
    <div class="grid grid-cols-2 gap-3 mb-8">
        <button onclick="showMuscleGroup('Chest')" class="bento-card p-4 text-center text-sm font-medium">Chest</button>
        <button onclick="showMuscleGroup('Back')" class="bento-card p-4 text-center text-sm font-medium">Back</button>
        <button onclick="showMuscleGroup('Legs')" class="bento-card p-4 text-center text-sm font-medium">Legs</button>
        <button onclick="showMuscleGroup('Core')" class="bento-card p-4 text-center text-sm font-medium">Core</button>
    </div>

    <div id="workout-ui" class="fixed inset-0 bg-white z-50 p-6 hidden flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <button onclick="closeWorkout()" class="text-gray-400 text-sm">Close</button>
            <span id="progress-text" class="text-xs font-bold tracking-widest uppercase">Exercise</span>
            <div class="w-8"></div>
        </div>

        <div class="anime-placeholder w-full h-64 mb-6">
            <div class="text-center">
                <p class="text-xs uppercase tracking-widest text-gray-400">[ Male Anime Character ]</p>
                <p class="text-[10px] mt-2 italic text-gray-300">Demonstrating Form...</p>
            </div>
        </div>

        <h2 id="ex-name-en" class="text-2xl font-semibold mb-1">---</h2>
        <h3 id="ex-name-es" class="text-sm text-gray-400 mb-8 italic">---</h3>

        <div class="flex gap-4 mb-8">
            <div class="flex-1">
                <label class="block text-[10px] uppercase text-gray-400 mb-1">Weight (KG)</label>
                <input type="number" id="weight-input" placeholder="0" class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-black text-xl">
            </div>
            <div class="flex-1">
                <label class="block text-[10px] uppercase text-gray-400 mb-1">Reps</label>
                <input type="number" id="reps-input" placeholder="0" class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-black text-xl">
            </div>
        </div>

        <div class="mt-auto grid grid-cols-2 gap-4">
            <button id="back-btn" onclick="prevExercise()" class="secondary-button font-medium">Back</button>
            <button id="next-btn" onclick="nextExercise()" class="zen-button font-medium">Next</button>
        </div>
    </div>

    <script>
        // Data Library
        const fullRoutine = [
            { en: "Alternating Dumbbell Curl", es: "Curl alterno con mancuerna", group: "Biceps" },
            { en: "Barbell Curl", es: "Curl con barra", group: "Biceps" },
            { en: "Concentration Curl", es: "Curl concentrado", group: "Biceps" },
            { en: "Dumbbell Military Press", es: "Press militar con mancuerna", group: "Shoulders" },
            { en: "Lateral Raises", es: "Elevaciones laterales", group: "Shoulders" },
            { en: "Front Raises", es: "Elevaciones frontales", group: "Shoulders" },
            { en: "Upper Crunches", es: "Abdominales Superiores", group: "Core" },
            { en: "Leg Raises", es: "Elevación de piernas", group: "Core" },
            { en: "Lying Oblique Crunch", es: "Crunch oblicuo acostado", group: "Core" }
        ];

        const library = [
            { en: "Bench Press", es: "Press de Banca", group: "Chest" },
            { en: "Incline Press", es: "Press Inclinado", group: "Chest" },
            { en: "Lat Pulldown", es: "Jalón al pecho", group: "Back" },
            { en: "Seated Row", es: "Remo sentado", group: "Back" },
            { en: "Squats", es: "Sentadillas", group: "Legs" },
            { en: "Leg Press", es: "Prensa", group: "Legs" }
        ];

        let activeSession = [];
        let currentIdx = 0;

        // Dynamic Greeting based on Irish Time
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = "Night Session";
            if (hour < 12) greeting = "Morning Session";
            else if (hour < 18) greeting = "Afternoon Session";
            document.getElementById('time-greeting').innerText = greeting;
        }

        function startWorkout(exercises) {
            activeSession = exercises;
            currentIdx = 0;
            document.getElementById('workout-ui').classList.remove('hidden');
            updateUI();
        }

        function showMuscleGroup(group) {
            // Filter both routine and library for the chosen muscle
            const filtered = [...fullRoutine, ...library].filter(ex => ex.group === group);
            if(filtered.length > 0) {
                startWorkout(filtered);
            } else {
                alert("More exercises coming soon for " + group);
            }
        }

        function closeWorkout() {
            document.getElementById('workout-ui').classList.add('hidden');
        }

        function nextExercise() {
            if (currentIdx < activeSession.length - 1) {
                currentIdx++;
                updateUI();
            } else {
                alert("Workout Complete! Stay Zen.");
                closeWorkout();
            }
        }

        function prevExercise() {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
            }
        }

        function updateUI() {
            const ex = activeSession[currentIdx];
            document.getElementById('ex-name-en').innerText = ex.en;
            document.getElementById('ex-name-es').innerText = ex.es;
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${activeSession.length}`;
            
            // Clear inputs for next exercise
            document.getElementById('weight-input').value = "";
            document.getElementById('reps-input').value = "";

            // Hide back button on first exercise
            document.getElementById('back-btn').style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = (currentIdx === activeSession.length - 1) ? 'Finish' : 'Log Set & Next';
        }

        updateGreeting();
    </script>
</body>
</html>
