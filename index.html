<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zen Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Prevents bouncing and scrolling when not needed */
        html, body { 
            overscroll-behavior-y: none; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fcfcfc;
            -webkit-tap-highlight-color: transparent;
        }

        body { font-family: 'Inter', sans-serif; color: #1a1a1a; display: flex; flex-direction: column; }
        
        /* Main containers allow scrolling only if content overflows */
        .scroll-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        .bento-card { background: white; border: 1px solid #eee; border-radius: 20px; transition: all 0.2s ease; }
        .zen-button { background: #1a1a1a; color: white; border-radius: 14px; padding: 16px; width: 100%; font-weight: 500; }
        .zen-button:active { opacity: 0.7; transform: scale(0.98); }
        .secondary-button { background: #f0f0f0; color: #555; border-radius: 14px; padding: 16px; font-weight: 500; }

        /* Numbered Circle Style */
        .selection-circle {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid #ddd; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: 600;
            transition: all 0.2s; color: transparent;
        }
        .selection-circle.active {
            background: #1a1a1a; border-color: #1a1a1a; color: white;
        }
    </style>
</head>
<body class="p-6">

    <div id="home-screen" class="flex flex-col h-full">
        <header class="mb-8 pt-4">
            <h1 id="time-greeting" class="text-xs tracking-widest uppercase text-gray-400 mb-1">Loading...</h1>
            <h2 class="text-2xl font-semibold italic">Stay focused.</h2>
        </header>

        <div class="scroll-container">
            <div class="bento-card p-6 mb-8 border-gray-100 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <span class="px-3 py-1 bg-gray-100 text-[10px] rounded-full uppercase tracking-wider font-semibold">Routine</span>
                </div>
                <h3 class="text-xl font-medium mb-1">Biceps & Shoulders</h3>
                <p class="text-sm text-gray-500 mb-6 italic text-gray-400">Standard Sequence</p>
                <button onclick="startWorkout(fullRoutine)" class="zen-button">Start Routine</button>
            </div>

            <h3 class="text-sm font-semibold mb-4 text-gray-400 uppercase tracking-tight">Explore</h3>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="openSelection('Chest')" class="bento-card p-5 text-center text-sm font-medium shadow-sm">Chest</button>
                <button onclick="openSelection('Back')" class="bento-card p-5 text-center text-sm font-medium shadow-sm">Back</button>
                <button onclick="openSelection('Legs')" class="bento-card p-5 text-center text-sm font-medium shadow-sm">Legs</button>
                <button onclick="openSelection('Core')" class="bento-card p-5 text-center text-sm font-medium shadow-sm">Core</button>
            </div>
        </div>
    </div>

    <div id="selection-ui" class="fixed inset-0 bg-white z-40 p-6 hidden flex flex-col">
        <header class="mb-6 flex justify-between items-center pt-4">
            <h2 id="selection-title" class="text-2xl font-semibold">Select</h2>
            <button onclick="closeModal('selection-ui')" class="text-gray-400 text-sm">Cancel</button>
        </header>
        <div id="exercise-list" class="scroll-container mb-6">
            </div>
        <div class="pb-4">
            <button onclick="startSelected()" class="zen-button">Start Selected</button>
        </div>
    </div>

    <div id="workout-ui" class="fixed inset-0 bg-white z-50 p-6 hidden flex flex-col">
        <div class="flex justify-between items-center mb-6 pt-4">
            <button onclick="closeModal('workout-ui')" class="text-gray-400 text-sm">Quit</button>
            <span id="progress-text" class="text-xs font-bold tracking-widest uppercase text-gray-400">1 / 4</span>
            <div class="w-8"></div>
        </div>

        <div class="w-full h-48 bg-gray-50 rounded-3xl flex items-center justify-center mb-8 border border-gray-100">
            <span class="text-[10px] uppercase tracking-widest text-gray-300 font-medium">[ Anime Instruction ]</span>
        </div>

        <h2 id="ex-name-en" class="text-2xl font-semibold mb-1">---</h2>
        <h3 id="ex-name-es" class="text-sm text-gray-400 mb-10 italic">---</h3>

        <div class="flex gap-6 mb-12">
            <div class="flex-1">
                <label class="block text-[10px] uppercase text-gray-400 font-bold mb-2">Weight (KG)</label>
                <input type="number" id="weight-input" placeholder="0" class="w-full border-b-2 border-gray-100 py-2 focus:outline-none focus:border-black text-2xl transition-colors">
            </div>
            <div class="flex-1">
                <label class="block text-[10px] uppercase text-gray-400 font-bold mb-2">Reps</label>
                <input type="number" id="reps-input" placeholder="0" class="w-full border-b-2 border-gray-100 py-2 focus:outline-none focus:border-black text-2xl transition-colors">
            </div>
        </div>

        <div class="mt-auto grid grid-cols-2 gap-4 pb-4">
            <button id="back-btn" onclick="prevExercise()" class="secondary-button">Back</button>
            <button id="next-btn" onclick="nextExercise()" class="zen-button">Next</button>
        </div>
    </div>

    <script>
        const fullRoutine = [
            { en: "Alternating Dumbbell Curl", es: "Curl alterno con mancuerna", group: "Biceps" },
            { en: "Barbell Curl", es: "Curl con barra", group: "Biceps" },
            { en: "Concentration Curl", es: "Curl concentrado", group: "Biceps" },
            { en: "Dumbbell Military Press", es: "Press militar con mancuerna", group: "Shoulders" },
            { en: "Lateral Raises", es: "Elevaciones laterales", group: "Shoulders" },
            { en: "Front Raises", es: "Elevaciones frontales", group: "Shoulders" },
            { en: "Upper Crunches", es: "Abdominales Superiores", group: "Core" },
            { en: "Leg Raises", es: "Elevación de piernas", group: "Core" },
            { en: "Lying Oblique Crunch", es: "Crunch oblicuo acostado", group: "Core" }
        ];

        const library = [
            { en: "Bench Press", es: "Press de Banca", group: "Chest" },
            { en: "Incline Dumbbell Press", es: "Press Inclinado Mancuerna", group: "Chest" },
            { en: "Chest Flyes", es: "Aperturas de Pecho", group: "Chest" },
            { en: "Lat Pulldowns", es: "Jalón al Pecho", group: "Back" },
            { en: "Bent Over Rows", es: "Remo con Barra", group: "Back" },
            { en: "Deadlifts", es: "Peso Muerto", group: "Back" },
            { en: "Squats", es: "Sentadillas", group: "Legs" },
            { en: "Leg Press", es: "Prensa de Piernas", group: "Legs" },
            { en: "Lunges", es: "Zancadas", group: "Legs" }
        ];

        let activeSession = [];
        let currentIdx = 0;
        let selectedInMenu = [];
        let currentMuscleGroupOptions = [];

        function updateGreeting() {
            const hour = new Date().getHours();
            let g = "Night Session";
            if (hour < 12) g = "Morning Session";
            else if (hour < 18) g = "Afternoon Session";
            document.getElementById('time-greeting').innerText = g;
        }

        function openSelection(group) {
            document.getElementById('selection-title').innerText = group;
            currentMuscleGroupOptions = [...fullRoutine, ...library].filter(ex => ex.group === group);
            selectedInMenu = [];
            renderSelectionList();
            document.getElementById('selection-ui').classList.remove('hidden');
        }

        function renderSelectionList() {
            const listDiv = document.getElementById('exercise-list');
            listDiv.innerHTML = '';
            
            currentMuscleGroupOptions.forEach((ex) => {
                const orderIndex = selectedInMenu.findIndex(s => s.en === ex.en);
                const isActive = orderIndex > -1;
                
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-5 mb-3 bento-card border-gray-50 cursor-pointer';
                item.onclick = () => toggleEx(ex);
                item.innerHTML = `
                    <div>
                        <p class="text-sm font-medium">${ex.en}</p>
                        <p class="text-[10px] text-gray-400 uppercase tracking-wide">${ex.es}</p>
                    </div>
                    <div class="selection-circle ${isActive ? 'active' : ''}">
                        ${isActive ? (orderIndex + 1) : ''}
                    </div>
                `;
                listDiv.appendChild(item);
            });
        }

        function toggleEx(exercise) {
            const idx = selectedInMenu.findIndex(s => s.en === exercise.en);
            if(idx > -1) {
                selectedInMenu.splice(idx, 1);
            } else {
                selectedInMenu.push(exercise);
            }
            renderSelectionList();
        }

        function startSelected() {
            if(selectedInMenu.length === 0) return alert("Select the order of exercises!");
            closeModal('selection-ui');
            startWorkout(selectedInMenu);
        }

        function startWorkout(exercises) {
            activeSession = exercises;
            currentIdx = 0;
            document.getElementById('workout-ui').classList.remove('hidden');
            updateUI();
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function nextExercise() {
            if (currentIdx < activeSession.length - 1) {
                currentIdx++;
                updateUI();
            } else {
                alert("Session Finished. Well done.");
                closeModal('workout-ui');
            }
        }

        function prevExercise() {
            if (currentIdx > 0) {
                currentIdx--;
                updateUI();
            }
        }

        function updateUI() {
            const ex = activeSession[currentIdx];
            document.getElementById('ex-name-en').innerText = ex.en;
            document.getElementById('ex-name-es').innerText = ex.es;
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${activeSession.length}`;
            document.getElementById('weight-input').value = "";
            document.getElementById('reps-input').value = "";
            document.getElementById('back-btn').style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = (currentIdx === activeSession.length - 1) ? 'Finish' : 'Log Set & Next';
        }

        updateGreeting();
    </script>
</body>
</html>
